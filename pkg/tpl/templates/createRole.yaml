apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: byzer-role
  namespace: {{.EngineConfig.Namespace}}
  labels:
    from: byzer-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - pods
  - pods/status
  - pods/log
  - services
  - services/status
  - endpoints
  - endpoints/status
  - deployments
  verbs:
  - get
  - list
  - watch
  - create
  - delete