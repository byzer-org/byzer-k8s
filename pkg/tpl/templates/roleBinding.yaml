apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: byzer-role-binding
  namespace: {{.EngineConfig.Namespace}}
  labels:
    from: byzer-role
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: byzer-role
subjects:
- kind: ServiceAccount
  name: {{.EngineConfig.ServiceAccountName}}
  namespace: {{.EngineConfig.Namespace}}